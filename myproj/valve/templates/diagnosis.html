<!-- Run and Diagnose Button -->
<div class="text-center my-4">
    <form method="post" action="{% url 'run_diagnosis' %}" id="diagnosisForm">
        {% csrf_token %}
        <button type="submit" class="btn btn-primary" id="diagnoseBtn">
            🔍 Run and Diagnose
        </button>
    </form>
    <div class="spinner-border text-primary mt-3" role="status" id="loadingSpinner" style="display:none;">
        <span class="visually-hidden">Loading...</span>
    </div>
</div>


    <h1>Diagnosis Results</h1>
    <div class="diagnosis">
        {% for result in diagnosis %}
            <div class="result">
                <h2>File: {{ result.file }}</h2>
                <p class="disease-name">Disease Name: <strong>{{ result.disease_name }}</strong></p>
                <p class="remarks">Remarks: <strong>{{ result.remarks }}</strong></p>
            </div>
        {% endfor %}
    </div>
   
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
